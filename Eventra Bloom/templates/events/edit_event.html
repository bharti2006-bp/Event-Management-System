{% extends 'events/base.html' %}
{% block title %}Edit Event — EventBloom{% endblock %}
{% block content %}

<div class="form-page" style="max-width:780px;">
  <a href="{% url 'event_detail' event.pk %}" style="font-size:0.85rem; color:var(--text-soft); text-decoration:none; display:inline-flex; align-items:center; gap:6px; margin-bottom:24px;">
    ← Back to Event
  </a>
  <div class="form-card">
    <h1 class="form-title">✏️ Edit Event</h1>
    <p class="form-sub">Update details for <strong>{{ event.title }}</strong></p>

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Event Title *</label>
        <input type="text" name="title" class="form-input" value="{{ event.title }}" required>
      </div>

      <div class="form-group">
        <label class="form-label">Category</label>
        <select name="category" class="form-select">
          <option value="">— Select Category —</option>
          {% for cat in categories %}
          <option value="{{ cat.id }}" {% if event.category.id == cat.id %}selected{% endif %}>{{ cat.icon }} {{ cat.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Description *</label>
        <textarea name="description" class="form-input form-textarea" required>{{ event.description }}</textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Venue *</label>
        <input type="text" name="venue" class="form-input" value="{{ event.venue }}" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Date *</label>
          <input type="date" name="date" class="form-input" value="{{ event.date|date:'Y-m-d' }}" required>
        </div>
        <div class="form-group">
          <label class="form-label">Max Participants</label>
          <input type="number" name="max_participants" class="form-input" value="{{ event.max_participants }}" min="1">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Start Time *</label>
          <input type="time" name="start_time" class="form-input" value="{{ event.start_time|time:'H:i' }}" required>
        </div>
        <div class="form-group">
          <label class="form-label">End Time *</label>
          <input type="time" name="end_time" class="form-input" value="{{ event.end_time|time:'H:i' }}" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Registration Deadline *</label>
          <input type="datetime-local" name="registration_deadline" class="form-input" value="{{ event.registration_deadline|date:'Y-m-d' }}T{{ event.registration_deadline|time:'H:i' }}" required>
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select name="status" class="form-select">
            <option value="upcoming" {% if event.status == 'upcoming' %}selected{% endif %}>Upcoming</option>
            <option value="ongoing" {% if event.status == 'ongoing' %}selected{% endif %}>Ongoing</option>
            <option value="completed" {% if event.status == 'completed' %}selected{% endif %}>Completed</option>
            <option value="cancelled" {% if event.status == 'cancelled' %}selected{% endif %}>Cancelled</option>
          </select>
        </div>
      </div>

      <div style="display:flex; gap:12px; margin-top:8px;">
        <button type="submit" class="btn btn-primary btn-lg">Save Changes</button>
        <a href="{% url 'event_detail' event.pk %}" class="btn btn-outline btn-lg">Cancel</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
