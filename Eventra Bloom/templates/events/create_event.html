{% extends 'events/base.html' %}
{% block title %}Create Event — EventBloom{% endblock %}
{% block content %}

<div class="form-page" style="max-width:780px;">
  <a href="{% url 'event_list' %}" style="font-size:0.85rem; color:var(--text-soft); text-decoration:none; display:inline-flex; align-items:center; gap:6px; margin-bottom:24px;">
    ← Back to Events
  </a>
  <div class="form-card">
    <h1 class="form-title">✨ Create Event</h1>
    <p class="form-sub">Fill in the details to create an amazing campus event</p>

    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Event Title *</label>
        <input type="text" name="title" class="form-input" placeholder="e.g. Annual Tech Fest 2024" required>
      </div>

      <div class="form-group">
        <label class="form-label">Category</label>
        <select name="category" class="form-select">
          <option value="">— Select Category —</option>
          {% for cat in categories %}
          <option value="{{ cat.id }}">{{ cat.icon }} {{ cat.name }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Description *</label>
        <textarea name="description" class="form-input form-textarea" placeholder="Describe your event in detail — what to expect, who should attend, etc." required></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Venue *</label>
        <input type="text" name="venue" class="form-input" placeholder="e.g. Auditorium A, Sports Ground, Online" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Date *</label>
          <input type="date" name="date" class="form-input" required>
        </div>
        <div class="form-group">
          <label class="form-label">Max Participants</label>
          <input type="number" name="max_participants" class="form-input" value="100" min="1" max="10000">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Start Time *</label>
          <input type="time" name="start_time" class="form-input" required>
        </div>
        <div class="form-group">
          <label class="form-label">End Time *</label>
          <input type="time" name="end_time" class="form-input" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Registration Deadline *</label>
        <input type="datetime-local" name="registration_deadline" class="form-input" required>
      </div>

      <div style="display:flex; gap:12px; margin-top:8px;">
        <button type="submit" class="btn btn-primary btn-lg">Create Event 🎉</button>
        <a href="{% url 'event_list' %}" class="btn btn-outline btn-lg">Cancel</a>
      </div>
    </form>
  </div>
</div>

{% endblock %}
