{% extends 'events/base.html' %}
{% block title %}Login — EventBloom{% endblock %}
{% block content %}

<div class="auth-page">
  <div style="width:100%; max-width:440px;">
    <div style="text-align:center; margin-bottom:32px;">
      <div style="width:64px; height:64px; background:linear-gradient(135deg,var(--pink),var(--lavender)); border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.8rem; margin:0 auto 16px; box-shadow:var(--shadow-md);">🌸</div>
      <h1 style="font-size:2rem; margin-bottom:6px;">Welcome back</h1>
      <p style="color:var(--text-soft);">Login to your EventBloom account</p>
    </div>

    <div class="form-card" style="padding:36px;">
      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">Username</label>
          <input type="text" name="username" class="form-input" placeholder="your_username" required autofocus>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-input" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%; margin-top:8px;">Login →</button>
      </form>

      <div class="form-divider" style="margin:24px 0;">or</div>

      <p style="text-align:center; font-size:0.9rem; color:var(--text-mid);">
        Don't have an account? <a href="{% url 'register' %}" style="color:var(--pink-deep); font-weight:600;">Sign up free</a>
      </p>
    </div>
  </div>
</div>

{% endblock %}
